version: '3.9'

services:

  backend:
    build: ./backend

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis

    ports:
      - "6379:6379"

volumes:
  mongo_data: